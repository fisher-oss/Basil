<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basil</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'EB Garamond', Georgia, serif;
  background: #F5F0E8;
  color: #2C2416;
  font-size: 16px;
}
.layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: 52px 1fr;
  height: 100vh;
  max-width: 1200px;
  margin: 0 auto;
}
/* Header */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 1px solid #D4C4A0;
  background: #FDFAF4;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.monogram {
  width: 32px; height: 32px;
  border: 1px solid #8B6F3E;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 14px; color: #8B6F3E;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 400;
  color: #2C2416; letter-spacing: 0.02em;
}
.header-sub { font-size: 13px; color: #8B7355; font-style: italic; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-btn {
  font-family: 'EB Garamond', serif; font-size: 14px;
  color: #8B7355; background: none; border: none; cursor: pointer;
  letter-spacing: 0.02em; padding: 4px 0;
  border-bottom: 1px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.header-btn:hover { color: #2C2416; border-bottom-color: #8B6F3E; }
/* Chat panel */
.chat-panel {
  display: flex; flex-direction: column;
  border-right: 1px solid #D4C4A0;
  background: #FDFAF4;
  overflow: hidden;
}
.chat-messages {
  flex: 1; overflow-y: auto;
  padding: 24px 24px 16px;
  display: flex; flex-direction: column; gap: 16px;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: #D4C4A0; border-radius: 2px; }
.msg { max-width: 82%; font-size: 15px; line-height: 1.6; }
.msg.user {
  align-self: flex-end;
  background: #2C2416; color: #F5F0E8;
  padding: 10px 16px; border-radius: 14px 14px 3px 14px;
}
.msg.assistant {
  align-self: flex-start;
  background: #EDE5D4; color: #2C2416;
  padding: 10px 16px; border-radius: 14px 14px 14px 3px;
  border: 1px solid #D4C4A0;
}
.msg.thinking {
  align-self: flex-start;
  color: #B0976B; font-style: italic; font-size: 14px;
  background: none; padding: 4px 0;
}
.chat-input-area {
  padding: 16px 24px;
  border-top: 1px solid #D4C4A0;
  background: #FDFAF4;
  display: flex; gap: 10px; align-items: flex-end;
}
.chat-input-area textarea {
  flex: 1; resize: none;
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 15px; line-height: 1.5;
  padding: 9px 14px;
  background: #F5F0E8;
  border: 1px solid #C8B89A;
  border-radius: 3px; color: #2C2416;
  min-height: 40px; max-height: 120px;
  outline: none; transition: border-color 0.2s;
}
.chat-input-area textarea:focus { border-color: #8B6F3E; }
.chat-input-area textarea::placeholder { color: #B0976B; font-style: italic; }
.send-btn {
  height: 40px; padding: 0 18px;
  font-family: 'EB Garamond', serif; font-size: 15px;
  background: #2C2416; color: #F5F0E8;
  border: none; border-radius: 3px; cursor: pointer;
  letter-spacing: 0.03em; transition: background 0.2s;
  white-space: nowrap;
}
.send-btn:hover { background: #3D3220; }
.send-btn:disabled { opacity: 0.4; cursor: default; }
/* Dashboard panel */
.dash-panel {
  display: flex; flex-direction: column;
  background: #F5F0E8; overflow: hidden;
}
.dash-tabs {
  display: flex;
  border-bottom: 1px solid #D4C4A0;
  background: #FDFAF4;
}
.dash-tab {
  flex: 1; padding: 13px 6px;
  text-align: center; font-size: 13px;
  font-family: 'EB Garamond', serif;
  cursor: pointer; color: #8B7355;
  border-bottom: 2px solid transparent;
  letter-spacing: 0.03em;
  transition: color 0.2s;
}
.dash-tab.active { color: #2C2416; border-bottom-color: #8B6F3E; }
.dash-tab:hover { color: #2C2416; }
.dash-body { flex: 1; overflow-y: auto; padding: 16px; }
.dash-body::-webkit-scrollbar { width: 4px; }
.dash-body::-webkit-scrollbar-thumb { background: #D4C4A0; border-radius: 2px; }
/* Section labels */
.slabel {
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: #B0976B;
  margin: 16px 0 8px; padding-bottom: 4px;
  border-bottom: 1px solid #D4C4A0;
}
.slabel:first-child { margin-top: 0; }
/* Task items */
.titem {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 8px 10px;
  border: 1px solid #D4C4A0;
  border-radius: 3px; margin-bottom: 5px;
  background: #FDFAF4; cursor: pointer;
  transition: background 0.15s;
}
.titem:hover { background: #EDE5D4; }
.chk {
  width: 14px; height: 14px; flex-shrink: 0; margin-top: 3px;
  border: 1px solid #C8B89A; border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #8B6F3E;
  transition: background 0.15s;
}
.chk.done { background: #EDE5D4; border-color: #8B6F3E; }
.tbody { flex: 1; min-width: 0; }
.tname { font-size: 14px; color: #2C2416; line-height: 1.4; }
.tname.done { text-decoration: line-through; color: #B0976B; }
.tmeta { font-size: 12px; color: #B0976B; margin-top: 3px; display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  font-size: 11px; padding: 1px 7px;
  border-radius: 20px; border: 1px solid #D4C4A0;
  background: #EDE5D4; color: #8B7355;
}
.pill.overdue { background: #F9EAE5; border-color: #D4937A; color: #8B3A2A; }
.pill.today { background: #F5EDD5; border-color: #C8A84B; color: #7A6020; }
/* Contacts */
.citem {
  padding: 8px 10px; border: 1px solid #D4C4A0;
  border-radius: 3px; margin-bottom: 5px; background: #FDFAF4;
}
.cname { font-size: 14px; font-weight: 500; color: #2C2416; display: flex; align-items: center; gap: 6px; }
.csub { font-size: 12px; color: #8B7355; margin-top: 2px; font-style: italic; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot.cold { background: #C0503A; }
.dot.warm { background: #C8A84B; }
.dot.ok { background: #6B8C5A; }
/* Metrics */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.metric {
  background: #FDFAF4; border: 1px solid #D4C4A0;
  border-radius: 3px; padding: 10px 12px;
}
.mval { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; color: #2C2416; }
.mlbl { font-size: 12px; color: #8B7355; margin-top: 2px; font-style: italic; }
/* Settings */
.sblock {
  margin-bottom: 12px; padding: 10px;
  border: 1px solid #D4C4A0; border-radius: 3px;
  background: #FDFAF4;
}
.catheader { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.catheader input {
  flex: 1; font-family: 'EB Garamond', serif; font-size: 14px; font-weight: 500;
  padding: 4px 8px; border: 1px solid #D4C4A0; border-radius: 2px;
  background: #F5F0E8; color: #2C2416; outline: none;
}
.srow { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.srow input {
  flex: 1; font-family: 'EB Garamond', serif; font-size: 13px;
  padding: 4px 8px; border: 1px solid #D4C4A0; border-radius: 2px;
  background: #F5F0E8; color: #2C2416; outline: none;
}
.sbtn {
  font-size: 13px; padding: 3px 8px;
  border: 1px solid #D4C4A0; border-radius: 2px;
  background: none; cursor: pointer; color: #B0976B;
  font-family: 'EB Garamond', serif;
}
.sbtn:hover { color: #8B3A2A; border-color: #D4937A; }
.addbtn {
  font-size: 13px; padding: 4px 10px; margin-top: 4px;
  border: 1px solid #C8B89A; border-radius: 2px;
  background: none; cursor: pointer; color: #8B7355;
  font-family: 'EB Garamond', serif; font-style: italic;
  transition: background 0.15s;
}
.addbtn:hover { background: #EDE5D4; }
.digest-btn {
  width: 100%; padding: 9px; margin-top: 16px;
  font-family: 'EB Garamond', serif; font-size: 14px;
  background: #2C2416; color: #F5F0E8;
  border: none; border-radius: 3px; cursor: pointer;
  letter-spacing: 0.03em; transition: background 0.2s;
}
.digest-btn:hover { background: #3D3220; }
.empty { font-size: 14px; color: #B0976B; text-align: center; padding: 28px 12px; font-style: italic; }
@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: 52px 1fr auto; }
  .dash-panel { max-height: 280px; border-top: 1px solid #D4C4A0; }
  .chat-panel { border-right: none; }
}
</style>
</head>
<body>
<div class="layout">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="monogram">B</div>
      <div>
        <h1>Basil</h1>
      </div>
      <span class="header-sub" id="status-text">Ready</span>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="sendDigest()">Send digest</button>
      <a href="/logout" class="header-btn">Sign out</a>
    </div>
  </header>

  <!-- Chat -->
  <div class="chat-panel">
    <div class="chat-messages" id="chat-messages">
      <div class="msg assistant">Good day. I'm Basil — type a thought, a task, or anything on your mind and I'll help structure it. You can also ask me what's open, who needs a follow-up, or query any part of your work.</div>
    </div>
    <div class="chat-input-area">
      <textarea id="chat-input" placeholder="Type anything — a task, a thought, a contact update..." rows="1"></textarea>
      <button class="send-btn" id="send-btn">Send</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dash-panel">
    <div class="dash-tabs">
      <div class="dash-tab active" onclick="setTab('today')">Today</div>
      <div class="dash-tab" onclick="setTab('contacts')">Contacts</div>
      <div class="dash-tab" onclick="setTab('projects')">Projects</div>
      <div class="dash-tab" onclick="setTab('settings')">Settings</div>
    </div>
    <div class="dash-body" id="dash-body">
      <div class="empty">Loading...</div>
    </div>
  </div>
</div>

<script>
let currentTab = 'today';
let allTasks = [];
let allContacts = [];
let taxonomy = {{ taxonomy|tojson }};

async function loadData() {
  const [tasks, contacts] = await Promise.all([
    fetch('/api/tasks').then(r => r.json()),
    fetch('/api/contacts').then(r => r.json())
  ]);
  allTasks = tasks;
  allContacts = contacts;
  renderDash();
}

function diffDays(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

async function sendMessage() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  addMsg('user', text);
  setStatus('Thinking...');
  const thinking = addMsg('thinking', 'Basil is considering...');
  document.getElementById('send-btn').disabled = true;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    const data = await res.json();
    thinking.remove();
    addMsg('assistant', data.reply);
    if (data.actions > 0) await loadData();
    setStatus('Ready');
  } catch(e) {
    thinking.remove();
    addMsg('assistant', 'Something went wrong. Please try again.');
    setStatus('Error');
  }
  document.getElementById('send-btn').disabled = false;
}

function addMsg(role, content) {
  const box = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = content;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  return d;
}

function setStatus(s) {
  document.getElementById('status-text').textContent = s;
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.dash-tab').forEach((el, i) => {
    el.classList.toggle('active', ['today','contacts','projects','settings'][i] === tab);
  });
  renderDash();
}

function renderDash() {
  const el = document.getElementById('dash-body');
  if (currentTab === 'today') renderToday(el);
  else if (currentTab === 'contacts') renderContacts(el);
  else if (currentTab === 'projects') renderProjects(el);
  else if (currentTab === 'settings') renderSettings(el);
}

function tHTML(t) {
  const d = diffDays(t.due);
  const badge = d === null ? '' : d < 0 ? '<span class="pill overdue">overdue</span>' : d === 0 ? '<span class="pill today">today</span>' : '';
  const proj = t.project ? `<span class="pill">${t.project}</span>` : '';
  const due = t.due && d !== null && d > 0 ? `<span>${t.due}</span>` : '';
  return `<div class="titem" onclick="toggleTask('${t.id}')">
    <div class="chk ${t.done ? 'done' : ''}">${t.done ? '✓' : ''}</div>
    <div class="tbody">
      <div class="tname ${t.done ? 'done' : ''}">${t.name}</div>
      <div class="tmeta">${proj}${badge}${due}</div>
    </div>
  </div>`;
}

async function toggleTask(id) {
  await fetch(`/api/tasks/${id}/toggle`, {method: 'POST'});
  await loadData();
}

function renderToday(el) {
  const open = allTasks.filter(t => !t.done);
  const ov = open.filter(t => t.due && diffDays(t.due) < 0);
  const td = open.filter(t => t.due && diffDays(t.due) === 0);
  const wk = open.filter(t => t.due && diffDays(t.due) > 0 && diffDays(t.due) <= 7);
  const nd = open.filter(t => !t.due);
  const cold = allContacts.filter(c => !c.lastContact || diffDays(c.lastContact) < -21).length;
  let h = `<div class="metrics">
    <div class="metric"><div class="mval">${open.length}</div><div class="mlbl">open tasks</div></div>
    <div class="metric"><div class="mval">${cold}</div><div class="mlbl">contacts to reach</div></div>
  </div>`;
  if (ov.length) { h += '<div class="slabel">Overdue</div>'; ov.forEach(t => h += tHTML(t)); }
  if (td.length) { h += '<div class="slabel">Due today</div>'; td.forEach(t => h += tHTML(t)); }
  if (wk.length) { h += '<div class="slabel">This week</div>'; wk.forEach(t => h += tHTML(t)); }
  if (nd.length) { h += `<div class="slabel">No date (${nd.length})</div>`; nd.slice(0, 10).forEach(t => h += tHTML(t)); }
  if (!open.length) h = '<div class="empty">Nothing open. Clear skies.</div>';
  el.innerHTML = h;
}

function renderContacts(el) {
  if (!allContacts.length) { el.innerHTML = '<div class="empty">No contacts yet. Tell me about someone you spoke with.</div>'; return; }
  const sorted = [...allContacts].sort((a, b) => {
    const da = a.lastContact ? diffDays(a.lastContact) : -9999;
    const db = b.lastContact ? diffDays(b.lastContact) : -9999;
    return da - db;
  });
  const cold = sorted.filter(c => !c.lastContact || diffDays(c.lastContact) < -21);
  const warm = sorted.filter(c => c.lastContact && diffDays(c.lastContact) >= -21);
  let h = '';
  if (cold.length) { h += '<div class="slabel">Needs attention</div>'; cold.forEach(c => h += cHTML(c, 'cold')); }
  if (warm.length) { h += '<div class="slabel">Recently contacted</div>'; warm.forEach(c => h += cHTML(c, 'ok')); }
  el.innerHTML = h;
}

function cHTML(c, temp) {
  const last = c.lastContact ? `Last contact: ${c.lastContact}` : 'Never logged';
  return `<div class="citem">
    <div class="cname"><span class="dot ${temp}"></span>${c.name}</div>
    <div class="csub">${[c.org, c.role].filter(Boolean).join(' · ')}</div>
    <div class="csub">${last}${c.nextAction ? ' — ' + c.nextAction : ''}</div>
  </div>`;
}

function renderProjects(el) {
  const open = allTasks.filter(t => !t.done);
  let h = '';
  taxonomy.forEach(cat => {
    const ct = open.filter(t => t.project === cat.name);
    if (!ct.length) return;
    h += `<div class="slabel">${cat.name} (${ct.length})</div>`;
    ct.slice(0, 8).forEach(t => h += tHTML(t));
  });
  if (!h) h = '<div class="empty">No open tasks yet.</div>';
  el.innerHTML = h;
}

function renderSettings(el) {
  let h = '<div class="slabel">Taxonomy</div>';
  taxonomy.forEach((cat, ci) => {
    h += `<div class="sblock"><div class="catheader">
      <input value="${cat.name}" onchange="updCat(${ci}, this.value)" />
      <button class="sbtn" onclick="delCat(${ci})">Remove</button>
    </div>`;
    cat.subs.forEach((sub, si) => {
      h += `<div class="srow">
        <input value="${sub}" onchange="updSub(${ci}, ${si}, this.value)" />
        <button class="sbtn" onclick="delSub(${ci}, ${si})">×</button>
      </div>`;
    });
    h += `<button class="addbtn" onclick="addSub(${ci})">+ add subcategory</button></div>`;
  });
  h += `<button class="addbtn" style="width:100%;margin-top:6px" onclick="addCat()">+ add category</button>`;
  h += `<button class="digest-btn" onclick="sendDigest()">Send digest now</button>`;
  el.innerHTML = h;
}

async function saveTaxonomy() {
  await fetch('/api/taxonomy', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(taxonomy)});
}
function updCat(ci, v) { taxonomy[ci].name = v; saveTaxonomy(); }
function updSub(ci, si, v) { taxonomy[ci].subs[si] = v; saveTaxonomy(); }
function delCat(ci) { if(confirm('Remove this category?')) { taxonomy.splice(ci, 1); saveTaxonomy(); renderDash(); } }
function delSub(ci, si) { taxonomy[ci].subs.splice(si, 1); saveTaxonomy(); renderDash(); }
function addSub(ci) { taxonomy[ci].subs.push('New subcategory'); saveTaxonomy(); renderDash(); }
function addCat() { taxonomy.push({name: 'New category', subs: ['New subcategory']}); saveTaxonomy(); renderDash(); }

async function sendDigest() {
  setStatus('Sending digest...');
  await fetch('/api/digest/send', {method: 'POST'});
  setStatus('Digest sent');
  setTimeout(() => setStatus('Ready'), 3000);
}

const inp = document.getElementById('chat-input');
inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
inp.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; });
document.getElementById('send-btn').addEventListener('click', sendMessage);

loadData();
</script>
</body>
</html>
